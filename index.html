<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventure — Find & share local events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .category-pill.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    #modal-backdrop { transition: opacity 0.2s; }
    #modal-panel { transition: transform 0.25s cubic-bezier(.4,0,.2,1), opacity 0.2s; }
    #modal-panel.entering { transform: translateY(16px); opacity: 0; }
    .card-img { transition: transform 0.3s ease; }
    .event-card:hover .card-img { transform: scale(1.05); }
  </style>
</head>
<body class="bg-gray-50 antialiased min-h-screen">

<!-- ───── HEADER ───── -->
<header class="fixed top-0 left-0 right-0 z-30 bg-white border-b border-gray-200 h-16 flex items-center px-6 gap-4">
  <a href="index.html" class="flex items-center gap-2 text-indigo-600 font-bold text-xl shrink-0">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    Eventure
  </a>
  <div class="flex-1"></div>
  <div id="header-auth"></div>
</header>

<!-- ───── PAGE HEADER ───── -->
<div class="pt-16 bg-white border-b border-gray-100">
  <div class="max-w-6xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-extrabold text-gray-900 mb-1">What's happening in Vienna</h1>
    <p class="text-gray-500 text-sm mb-6">Find events, join the community</p>
    <div class="flex flex-col sm:flex-row gap-3">
      <div class="relative max-w-sm flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="search" type="text" placeholder="Search events…" class="w-full pl-9 pr-4 py-2 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
      </div>
    </div>
    <div id="category-filter" class="mt-4 flex gap-2 overflow-x-auto pb-1 scrollbar-hide"></div>
  </div>
</div>

<!-- ───── GRID ───── -->
<main class="max-w-6xl mx-auto px-6 py-8">
  <p id="event-count" class="text-xs text-gray-400 mb-5"></p>
  <div id="event-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  <div id="empty-state" class="hidden text-center py-24 text-gray-400">
    <p class="text-sm">No events match your filters.</p>
  </div>
</main>

<!-- ───── MODAL ───── -->
<div id="modal-backdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0"></div>
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none" id="modal-wrapper">
  <div id="modal-panel" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto pointer-events-auto hidden entering">
    <button onclick="closeModal()" class="absolute top-4 right-4 z-10 bg-white/90 backdrop-blur-sm rounded-full p-1.5 shadow hover:bg-gray-100 transition-colors">
      <svg class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="modal-content" class="p-6"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
