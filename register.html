<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Eventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="bg-gray-50 antialiased min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 text-indigo-600 font-bold text-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Eventure
      </a>
      <p class="text-gray-500 mt-2 text-sm">Create your free account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <h1 class="text-xl font-bold text-gray-900 mb-6">Join Eventure</h1>

      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Your name *</label>
          <input id="name" type="text" placeholder="Alex Müller" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email *</label>
          <input id="email" type="email" placeholder="you@example.com" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password *</label>
          <input id="password" type="password" placeholder="••••••••" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Short bio (optional)</label>
          <textarea id="bio" rows="2" placeholder="Food lover, hiker, curious about everything…"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 resize-none"></textarea>
        </div>
        <p id="error" class="text-sm text-red-500 hidden"></p>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition-colors">
          Create account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a href="login.html" class="text-indigo-600 hover:underline font-medium">Sign in</a>
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", e => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const bio  = document.getElementById("bio").value.trim();
      if (!name) return;

      const id = "user-" + Date.now();
      const newUser = {
        id,
        name,
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`,
        bio: bio || "New to Eventure!",
        joinedAt: new Date().toISOString().split("T")[0],
        eventsCreated: 0,
        eventsJoined: 0,
      };

      STATE.users.push(newUser);
      STATE.currentUserId = id;
      saveState();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
