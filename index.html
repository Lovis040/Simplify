<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simplify — Find & share local events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
    }
  </script>
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    :root {
      --bg:      #0c0c0c;
      --surface: #141414;
      --s2:      #1e1e1e;
      --s3:      #272727;
      --border:  #2a2a2a;
      --text:    #f0f0f0;
      --muted:   #6b6b6b;
    }
    body { background: var(--bg); color: var(--text); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .category-pill {
      background: var(--s2); color: #9ca3af;
      border: 1px solid var(--border);
      transition: all .15s;
    }
    .category-pill:hover { border-color: #818cf8; color: #818cf8; }
    .category-pill.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    #modal-backdrop { transition: opacity 0.2s; }
    #modal-panel { transition: transform 0.25s cubic-bezier(.4,0,.2,1), opacity 0.2s; }
    #modal-panel.entering { transform: translateY(16px); opacity: 0; }
    .card-img { transition: transform 0.3s ease; }
    .event-card:hover .card-img { transform: scale(1.05); }
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      transition: box-shadow .15s, border-color .15s;
    }
    .event-card:hover { border-color: #3a3a3a; box-shadow: 0 4px 24px rgba(0,0,0,.5); }
    input, select, textarea {
      background: var(--s2) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #818cf8 !important;
      box-shadow: 0 0 0 3px rgba(129,140,248,.15) !important;
    }
    .leaflet-container { background: #1a1a1a; }
  </style>
</head>
<body class="antialiased min-h-screen">

<!-- ── HEADER ── -->
<header style="background:var(--surface);border-bottom:1px solid var(--border)"
  class="fixed top-0 left-0 right-0 z-30 h-16 flex items-center px-6 gap-4">
  <a href="index.html" class="flex items-center gap-2 font-bold text-xl shrink-0" style="color:#818cf8">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    Simplify
  </a>
  <div class="flex-1"></div>
  <div id="header-auth"></div>
</header>

<!-- ── PAGE HEADER ── -->
<div class="pt-16" style="background:var(--surface);border-bottom:1px solid var(--border)">
  <div class="max-w-6xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-extrabold mb-1" style="color:var(--text)">What's happening in Vienna</h1>
    <p class="text-sm mb-6" style="color:var(--muted)">Find events, join the community</p>
    <div class="relative max-w-sm">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4" style="color:var(--muted)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search" type="text" placeholder="Search events…" class="w-full pl-9 pr-4 py-2 rounded-lg text-sm" />
    </div>
    <div id="category-filter" class="mt-4 flex gap-2 overflow-x-auto pb-1 scrollbar-hide"></div>
  </div>
</div>

<!-- ── GRID ── -->
<main class="max-w-6xl mx-auto px-6 py-8">
  <p id="event-count" class="text-xs mb-5" style="color:var(--muted)"></p>
  <div id="event-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  <div id="empty-state" class="hidden text-center py-24" style="color:var(--muted)">
    <p class="text-sm">No events match your filters.</p>
  </div>
</main>

<!-- ── MODAL ── -->
<div id="modal-backdrop" class="fixed inset-0 z-40 hidden opacity-0" style="background:rgba(0,0,0,.7);backdrop-filter:blur(4px)"></div>
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none" id="modal-wrapper">
  <div id="modal-panel" class="relative rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto pointer-events-auto hidden entering"
    style="background:var(--surface);border:1px solid var(--border)">
    <button onclick="closeModal()" class="absolute top-4 right-4 z-10 rounded-full p-1.5 transition-colors"
      style="background:var(--s3);color:#9ca3af" onmouseover="this.style.color='#f0f0f0'" onmouseout="this.style.color='#9ca3af'">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="modal-content" class="p-6"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
