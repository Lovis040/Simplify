<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Eventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="bg-gray-50 antialiased min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 text-indigo-600 font-bold text-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Eventure
      </a>
      <p class="text-gray-500 mt-2 text-sm">Sign in to join and post events</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <h1 class="text-xl font-bold text-gray-900 mb-6">Welcome back</h1>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input id="password" type="password" placeholder="••••••••" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <p id="error" class="text-sm text-red-500 hidden"></p>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition-colors">
          Sign in
        </button>
      </form>

      <div class="mt-6">
        <p class="text-xs text-center text-gray-400 mb-3">— Demo accounts (password: "password") —</p>
        <div id="demo-accounts" class="grid grid-cols-2 gap-2"></div>
      </div>

      <p class="text-center text-sm text-gray-500 mt-6">
        No account? <a href="register.html" class="text-indigo-600 hover:underline font-medium">Join free</a>
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const DEMO = {
      "alex@demo.com":   "user-1",
      "sarah@demo.com":  "user-2",
      "marcus@demo.com": "user-3",
      "demo@demo.com":   "user-4",
    };

    // Render demo buttons
    const container = document.getElementById("demo-accounts");
    INITIAL_USERS.forEach(u => {
      const btn = document.createElement("button");
      btn.className = "flex items-center gap-2 p-2 rounded-lg border border-gray-200 hover:border-indigo-300 hover:bg-indigo-50 transition-all text-left";
      btn.innerHTML = `<img src="${u.avatar}" class="h-7 w-7 rounded-full" /><span class="text-xs font-medium text-gray-700 truncate">${u.name}</span>`;
      btn.addEventListener("click", () => loginAs(u.id));
      container.appendChild(btn);
    });

    function loginAs(userId) {
      STATE.currentUserId = userId;
      saveState();
      window.location.href = "index.html";
    }

    document.getElementById("login-form").addEventListener("submit", e => {
      e.preventDefault();
      const email = document.getElementById("email").value.toLowerCase();
      const pwd   = document.getElementById("password").value;
      const userId = DEMO[email];
      if (userId && pwd === "password") {
        loginAs(userId);
      } else {
        const err = document.getElementById("error");
        err.textContent = "Invalid credentials. Try a demo account below.";
        err.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
