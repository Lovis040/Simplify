<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post an Event — Eventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="bg-gray-50 antialiased min-h-screen">

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-30 bg-white border-b border-gray-200 h-16 flex items-center px-6 gap-4">
  <a href="index.html" class="flex items-center gap-2 text-indigo-600 font-bold text-xl">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    Eventure
  </a>
</header>

<div class="pt-24 max-w-2xl mx-auto px-4 pb-12">
  <a href="index.html" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800 mb-6 transition-colors">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to events
  </a>

  <div id="auth-check" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 p-12 text-center">
    <p class="text-gray-600 mb-4">You need to be signed in to post an event.</p>
    <a href="login.html" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors">Sign in</a>
  </div>

  <div id="form-wrap" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Post an event</h1>
    <p class="text-sm text-gray-500 mb-8">Share something fun with your community in Vienna.</p>

    <form id="event-form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Event title *</label>
        <input id="title" type="text" placeholder="Sunday Brunch at Café Central…" required
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Category *</label>
        <select id="category" required
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 bg-white">
          <option value="">Pick a category</option>
          <option value="food & drinks">Food & Drinks</option>
          <option value="sports">Sports</option>
          <option value="arts & culture">Arts & Culture</option>
          <option value="music">Music</option>
          <option value="networking">Networking</option>
          <option value="outdoor">Outdoor</option>
          <option value="gaming">Gaming</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Date *</label>
          <input id="date" type="date" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Time *</label>
          <input id="time" type="time" required
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Location *</label>
        <select id="location-preset"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 bg-white mb-2">
          <option value="Café Central|Herrengasse 14, 1010 Wien|48.2102|16.3662">Café Central</option>
          <option value="Prater Hauptallee|Prater, 1020 Wien|48.2156|16.3961">Prater Hauptallee</option>
          <option value="Naschmarkt|Naschmarkt, 1060 Wien|48.1985|16.3626">Naschmarkt</option>
          <option value="Stadtpark|Stadtpark, 1030 Wien|48.2037|16.3797">Stadtpark</option>
          <option value="Votivkirche|Rooseveltplatz, 1090 Wien|48.2231|16.3598">Votivkirche</option>
          <option value="Mariahilfer Straße|Mariahilfer Str. 10, 1060 Wien|48.1969|16.3536">Mariahilfer Straße</option>
          <option value="Belvedere|Prinz-Eugen-Str. 27, 1030 Wien|48.1908|16.3805">Belvedere</option>
          <option value="custom|custom||">Custom address…</option>
        </select>
        <div id="custom-address-wrap" class="hidden">
          <input id="custom-address" type="text" placeholder="Enter address…"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
        <textarea id="description" rows="4" placeholder="Tell people what to expect, what to bring, who it's for…"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 resize-none"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Max attendees</label>
          <input id="max-attendees" type="number" value="10" min="2" max="200"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Price (€, 0 = free)</label>
          <input id="price" type="number" value="0" min="0" step="0.5"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Cover image URL (optional)</label>
        <input id="image-url" type="url" placeholder="https://images.unsplash.com/…"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
        <p class="text-xs text-gray-400 mt-1">Paste any public image URL, e.g. from Unsplash.</p>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition-colors">
          Post event
        </button>
        <a href="index.html" class="px-5 py-2.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>

<script src="data.js"></script>
<script>
  // Set min date
  document.getElementById("date").min = new Date().toISOString().split("T")[0];

  // Auth check
  if (!STATE.currentUserId) {
    document.getElementById("form-wrap").classList.add("hidden");
    document.getElementById("auth-check").classList.remove("hidden");
  }

  // Custom address toggle
  document.getElementById("location-preset").addEventListener("change", function() {
    const isCustom = this.value.startsWith("custom|");
    document.getElementById("custom-address-wrap").classList.toggle("hidden", !isCustom);
  });

  document.getElementById("event-form").addEventListener("submit", e => {
    e.preventDefault();
    const uid = STATE.currentUserId;
    if (!uid) return;

    const preset = document.getElementById("location-preset").value.split("|");
    const isCustom = preset[0] === "custom";
    const customAddr = document.getElementById("custom-address").value.trim();

    const location = isCustom
      ? { name:"Custom", address: customAddr, lat:48.2082, lng:16.3738 }
      : { name:preset[0], address:preset[1], lat:parseFloat(preset[2]), lng:parseFloat(preset[3]) };

    const newEvent = {
      id: "evt-" + Date.now(),
      title: document.getElementById("title").value.trim(),
      description: document.getElementById("description").value.trim(),
      category: document.getElementById("category").value,
      date: document.getElementById("date").value,
      time: document.getElementById("time").value,
      location,
      maxAttendees: parseInt(document.getElementById("max-attendees").value),
      attendees: [],
      hostId: uid,
      imageUrl: document.getElementById("image-url").value.trim() || undefined,
      price: parseFloat(document.getElementById("price").value) || 0,
      createdAt: new Date().toISOString(),
    };

    STATE.events.unshift(newEvent);
    const user = STATE.users.find(u => u.id === uid);
    if (user) user.eventsCreated++;
    saveState();
    window.location.href = `index.html?event=${newEvent.id}`;
  });
</script>
</body>
</html>
