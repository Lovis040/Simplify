<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Tick It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    :root { --bg:#0c0c0c; --surface:#141414; --s2:#1e1e1e; --border:#2a2a2a; --text:#f0f0f0; --muted:#6b6b6b; }
    body { background: var(--bg); color: var(--text); }
    .event-card { background: var(--surface); border: 1px solid var(--border); transition: box-shadow .15s, border-color .15s; }
    .event-card:hover { border-color: #3a3a3a; box-shadow: 0 4px 24px rgba(0,0,0,.5); }
    .card-img { transition: transform .3s ease; }
    .event-card:hover .card-img { transform: scale(1.05); }
  </style>
</head>
<body class="antialiased min-h-screen">

<header style="background:var(--surface);border-bottom:1px solid var(--border)"
  class="fixed top-0 left-0 right-0 z-30 h-16 flex items-center px-6 gap-4">
  <a href="index.html" class="flex items-center gap-2 font-bold text-xl" style="color:#818cf8">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Tick It
  </a>
  <div class="flex-1"></div>
  <div id="header-auth"></div>
</header>

<div class="pt-24 max-w-3xl mx-auto px-4 pb-12">
  <button onclick="history.back()" class="inline-flex items-center gap-2 text-sm mb-6 transition-colors" style="color:var(--muted)"
    onmouseover="this.style.color='#f0f0f0'" onmouseout="this.style.color='var(--muted)'">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back
  </button>
  <div id="profile-content"></div>
</div>

<script src="data.js"></script>
<script>
  const profileId = new URLSearchParams(window.location.search).get("id");

  function renderHeader() {
    const user = STATE.users.find(u => u.id === STATE.currentUserId);
    const el = document.getElementById("header-auth");
    if (!el) return;
    if (user) {
      el.innerHTML = `
        <div class="flex items-center gap-3">
          <a href="new-event.html" class="flex items-center gap-1.5 text-white text-sm font-semibold px-3 py-1.5 rounded-lg"
            style="background:#4f46e5" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            Post Event
          </a>
          <a href="profile.html?id=${user.id}">
            <img src="${user.avatar}" class="h-8 w-8 rounded-full" alt="${user.name}" />
          </a>
          <button onclick="logout()" style="color:#6b6b6b" onmouseover="this.style.color='#f0f0f0'" onmouseout="this.style.color='#6b6b6b'">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="flex items-center gap-2">
          <a href="login.html" class="text-sm font-medium px-3 py-1.5 rounded-lg" style="color:#9ca3af"
            onmouseover="this.style.background='#1e1e1e';this.style.color='#f0f0f0'" onmouseout="this.style.background='';this.style.color='#9ca3af'">Sign in</a>
          <a href="register.html" class="text-white text-sm font-semibold px-3 py-1.5 rounded-lg"
            style="background:#4f46e5" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">Join free</a>
        </div>`;
    }
  }

  function logout() {
    STATE.currentUserId = null;
    saveState();
    renderHeader();
  }

  function formatMonth(d) {
    return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { month:"long", year:"numeric" });
  }

  function formatDateShort(d) {
    return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
  }

  const COLORS = { "food & drinks":"#f97316","sports":"#22c55e","arts & culture":"#a855f7","music":"#ec4899","networking":"#3b82f6","outdoor":"#84cc16","gaming":"#f59e0b","other":"#6366f1" };

  function eventCardHTML(event) {
    const host    = STATE.users.find(u => u.id === event.hostId);
    const isHost  = STATE.currentUserId === event.hostId;
    const isJoined= STATE.currentUserId && event.attendees.includes(STATE.currentUserId);
    const color   = COLORS[event.category] ?? "#6366f1";
    return `
    <a href="index.html?event=${event.id}" class="event-card block rounded-xl overflow-hidden">
      ${event.imageUrl ? `
        <div class="relative h-36 overflow-hidden">
          <img src="${event.imageUrl}" class="card-img w-full h-full object-cover" />
          <div class="absolute top-3 left-3 text-xs font-semibold text-white px-2.5 py-1 rounded-full capitalize" style="background:${color}">${event.category}</div>
        </div>` : ""}
      <div class="p-4">
        <h3 class="font-semibold text-sm mb-2 line-clamp-2" style="color:#f0f0f0">${event.title}</h3>
        <div class="text-xs space-y-1" style="color:#6b6b6b">
          <div>${formatDateShort(event.date)} · ${event.time}</div>
          <div>${event.location.name}</div>
          <div>${event.attendees.length}/${event.maxAttendees} joined</div>
        </div>
        <div class="mt-3 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <img src="${host?.avatar ?? ""}" class="h-6 w-6 rounded-full" />
            <span class="text-xs" style="color:#6b6b6b">${host?.name ?? ""}</span>
          </div>
          ${isHost   ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full" style="color:#818cf8;border:1px solid #3730a3;background:#1e1b4b">Your event</span>' :
            isJoined ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full" style="color:#34d399;border:1px solid #065f46;background:#022c22">Joined</span>' : ""}
        </div>
      </div>
    </a>`;
  }

  function renderProfile() {
    const u  = STATE.users.find(u => u.id === profileId);
    const el = document.getElementById("profile-content");
    if (!u) {
      el.innerHTML = `<div class="text-center py-20" style="color:var(--muted)"><p>User not found.</p></div>`;
      return;
    }
    const isOwn  = STATE.currentUserId === u.id;
    const hosted = STATE.events.filter(e => e.hostId === u.id);
    const joined = STATE.events.filter(e => e.hostId !== u.id && e.attendees.includes(u.id));

    el.innerHTML = `
      <div class="rounded-2xl p-8 mb-6" style="background:var(--surface);border:1px solid var(--border)">
        <div class="flex items-start gap-6">
          <img src="${u.avatar}" class="h-20 w-20 rounded-full shrink-0" alt="${u.name}" />
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-3 flex-wrap">
              <h1 class="text-2xl font-bold" style="color:var(--text)">${u.name}</h1>
              ${isOwn ? '<span class="text-xs font-semibold px-2.5 py-0.5 rounded-full" style="color:#818cf8;border:1px solid #3730a3;background:#1e1b4b">You</span>' : ""}
              ${isSuperhost(u) ? SUPERHOST_BADGE : ""}
            </div>
            <p class="mt-1 text-sm" style="color:#9ca3af">${u.bio}</p>
            <p class="text-sm mt-2" style="color:var(--muted)">Joined ${formatMonth(u.joinedAt)}</p>
            <div class="flex items-center gap-6 mt-4">
              <div class="text-center">
                <p class="text-2xl font-bold" style="color:var(--text)">${u.eventsCreated}</p>
                <p class="text-xs" style="color:var(--muted)">Events hosted</p>
              </div>
              <div class="w-px h-8" style="background:var(--border)"></div>
              <div class="text-center">
                <p class="text-2xl font-bold" style="color:var(--text)">${u.eventsJoined}</p>
                <p class="text-xs" style="color:var(--muted)">Events joined</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      ${hosted.length > 0 ? `
        <h2 class="text-lg font-semibold mb-3" style="color:var(--text)">${isOwn ? "Your events" : u.name.split(" ")[0] + "'s events"}</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">${hosted.map(eventCardHTML).join("")}</div>` : ""}

      ${joined.length > 0 ? `
        <h2 class="text-lg font-semibold mb-3" style="color:var(--text)">${isOwn ? "Events you've joined" : u.name.split(" ")[0] + " joined"}</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">${joined.map(eventCardHTML).join("")}</div>` : ""}

      ${hosted.length === 0 && joined.length === 0 ? `
        <div class="rounded-2xl p-12 text-center" style="background:var(--surface);border:1px solid var(--border);color:var(--muted)">
          <p class="text-sm">${isOwn ? "You haven't hosted or joined any events yet." : u.name.split(" ")[0] + " hasn't joined any events yet."}</p>
          ${isOwn ? '<a href="index.html" class="inline-block mt-4 text-white font-semibold px-5 py-2.5 rounded-xl" style="background:#4f46e5">Explore events</a>' : ""}
        </div>` : ""}
    `;
  }

  renderHeader();
  renderProfile();
</script>
</body>
</html>
