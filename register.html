<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Tick It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    :root { --bg:#0c0c0c; --surface:#141414; --s2:#1e1e1e; --border:#2a2a2a; --text:#f0f0f0; --muted:#6b6b6b; }
    body { background: var(--bg); color: var(--text); }
    input, textarea {
      background: var(--s2) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; width: 100%; padding: .5rem .75rem;
      border-radius: .5rem; font-size: .875rem; outline: none;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus { border-color: #818cf8 !important; box-shadow: 0 0 0 3px rgba(129,140,248,.15) !important; }
    textarea { resize: none; }
  </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 font-bold text-2xl" style="color:#818cf8">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Tick It
      </a>
      <p class="mt-2 text-sm" style="color:var(--muted)">Create your free account</p>
    </div>

    <div class="rounded-2xl p-8" style="background:var(--surface);border:1px solid var(--border)">
      <h1 class="text-xl font-bold mb-6" style="color:var(--text)">Join Tick It</h1>

      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Your name *</label>
          <input id="name" type="text" placeholder="Alex Müller" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Email *</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Password *</label>
          <input id="password" type="password" placeholder="••••••••" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Short bio (optional)</label>
          <textarea id="bio" rows="2" placeholder="Food lover, hiker, curious about everything…"></textarea>
        </div>
        <p id="error" class="text-sm hidden" style="color:#f87171"></p>
        <button type="submit" class="w-full text-white font-semibold py-2.5 rounded-xl transition-colors"
          style="background:#4f46e5" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">
          Create account
        </button>
      </form>

      <p class="text-center text-sm mt-6" style="color:var(--muted)">
        Already have an account?
        <a href="login.html" class="font-medium" style="color:#818cf8">Sign in</a>
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", e => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const bio  = document.getElementById("bio").value.trim();
      if (!name) return;

      const id = "user-" + Date.now();
      STATE.users.push({
        id, name,
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`,
        bio: bio || "New to Tick It!",
        joinedAt: new Date().toISOString().split("T")[0],
        eventsCreated: 0, eventsJoined: 0,
      });
      STATE.currentUserId = id;
      saveState();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
