<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Tick-It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    :root { --bg:#0c0c0c; --surface:#141414; --s2:#1e1e1e; --border:#2a2a2a; --text:#f0f0f0; --muted:#6b6b6b; }
    body { background: var(--bg); color: var(--text); }
    input {
      background: var(--s2) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; width: 100%; padding: .5rem .75rem;
      border-radius: .5rem; font-size: .875rem; outline: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: #818cf8 !important; box-shadow: 0 0 0 3px rgba(129,140,248,.15) !important; }
  </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 font-bold text-2xl" style="color:#818cf8">
        <img src="logo.png" alt="Tick-It" style="height:36px;width:auto" />
        Tick-It
      </a>
      <p class="mt-2 text-sm" style="color:var(--muted)">Sign in to join and post events</p>
    </div>

    <div class="rounded-2xl p-8" style="background:var(--surface);border:1px solid var(--border)">
      <h1 class="text-xl font-bold mb-6" style="color:var(--text)">Welcome back</h1>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Password</label>
          <input id="password" type="password" placeholder="••••••••" required />
        </div>
        <p id="error" class="text-sm hidden" style="color:#f87171"></p>
        <button type="submit" class="w-full text-white font-semibold py-2.5 rounded-xl transition-colors"
          style="background:#4f46e5" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">
          Sign in
        </button>
      </form>

      <div class="mt-6">
        <p class="text-xs text-center mb-3" style="color:var(--muted)">— Demo accounts (password: "password") —</p>
        <div id="demo-accounts" class="grid grid-cols-2 gap-2"></div>
      </div>

      <p class="text-center text-sm mt-6" style="color:var(--muted)">
        No account?
        <a href="register.html" class="font-medium" style="color:#818cf8">Join free</a>
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const DEMO = {
      "alex@demo.com":   "user-1",
      "sarah@demo.com":  "user-2",
      "marcus@demo.com": "user-3",
      "demo@demo.com":   "user-4",
    };

    const container = document.getElementById("demo-accounts");
    INITIAL_USERS.forEach(u => {
      const btn = document.createElement("button");
      btn.style.cssText = "display:flex;align-items:center;gap:.5rem;padding:.5rem;border-radius:.5rem;border:1px solid #2a2a2a;background:#1e1e1e;text-align:left;width:100%;cursor:pointer;transition:border-color .15s";
      btn.innerHTML = `<img src="${u.avatar}" style="height:28px;width:28px;border-radius:50%" /><span style="font-size:.75rem;font-weight:500;color:#d1d5db;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.name}</span>`;
      btn.addEventListener("mouseover", () => btn.style.borderColor = "#818cf8");
      btn.addEventListener("mouseout",  () => btn.style.borderColor = "#2a2a2a");
      btn.addEventListener("click", () => loginAs(u.id));
      container.appendChild(btn);
    });

    function loginAs(userId) {
      STATE.currentUserId = userId;
      saveState();
      window.location.href = "index.html";
    }

    document.getElementById("login-form").addEventListener("submit", e => {
      e.preventDefault();
      const email  = document.getElementById("email").value.toLowerCase();
      const pwd    = document.getElementById("password").value;
      const userId = DEMO[email];
      if (userId && pwd === "password") {
        loginAs(userId);
      } else {
        const err = document.getElementById("error");
        err.textContent = "Invalid credentials. Try a demo account below.";
        err.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
