<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post an Event — Tick It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    :root { --bg:#0c0c0c; --surface:#141414; --s2:#1e1e1e; --border:#2a2a2a; --text:#f0f0f0; --muted:#6b6b6b; }
    body { background: var(--bg); color: var(--text); }
    input, select, textarea {
      background: var(--s2) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; width: 100%; padding: .5rem .75rem;
      border-radius: .5rem; font-size: .875rem; outline: none;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, select:focus, textarea:focus { border-color: #818cf8 !important; box-shadow: 0 0 0 3px rgba(129,140,248,.15) !important; }
    select option { background: #1e1e1e; color: #f0f0f0; }
    textarea { resize: none; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
  </style>
</head>
<body class="antialiased min-h-screen">

<header style="background:var(--surface);border-bottom:1px solid var(--border)"
  class="fixed top-0 left-0 right-0 z-30 h-16 flex items-center px-6">
  <a href="index.html" class="flex items-center gap-2 font-bold text-xl" style="color:#818cf8">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Tick It
  </a>
</header>

<div class="pt-24 max-w-2xl mx-auto px-4 pb-12">
  <a href="index.html" class="inline-flex items-center gap-2 text-sm mb-6 transition-colors" style="color:var(--muted)"
    onmouseover="this.style.color='#f0f0f0'" onmouseout="this.style.color='var(--muted)'">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to events
  </a>

  <div id="auth-check" class="hidden rounded-2xl p-12 text-center" style="background:var(--surface);border:1px solid var(--border)">
    <p class="mb-4" style="color:#9ca3af">You need to be signed in to post an event.</p>
    <a href="login.html" class="inline-block text-white font-semibold px-5 py-2.5 rounded-xl transition-colors"
      style="background:#4f46e5" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">Sign in</a>
  </div>

  <div id="form-wrap" class="rounded-2xl p-8" style="background:var(--surface);border:1px solid var(--border)">
    <h1 class="text-2xl font-bold mb-1" style="color:var(--text)">Post an event</h1>
    <p class="text-sm mb-8" style="color:var(--muted)">Share something fun with your community in Berlin.</p>

    <form id="event-form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Event title *</label>
        <input id="title" type="text" placeholder="Sunday Brunch at Café Central…" required />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Category *</label>
        <select id="category" required>
          <option value="">Pick a category</option>
          <option value="food & drinks">Food & Drinks</option>
          <option value="sports">Sports</option>
          <option value="arts & culture">Arts & Culture</option>
          <option value="music">Music</option>
          <option value="networking">Networking</option>
          <option value="outdoor">Outdoor</option>
          <option value="gaming">Gaming</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Date *</label>
          <input id="date" type="date" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Time *</label>
          <input id="time" type="time" required />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Location *</label>
        <select id="location-preset" class="mb-2">
          <option value="Mauerpark|Bernauer Str. 63-64, 13355 Berlin|52.5414|13.4022">Mauerpark</option>
          <option value="Tiergarten|Tiergarten, 10785 Berlin|52.5144|13.3500">Tiergarten</option>
          <option value="Hackescher Markt|Hackescher Markt, 10178 Berlin|52.5233|13.4021">Hackescher Markt</option>
          <option value="Prenzlauer Berg|Kastanienallee 15, 10435 Berlin|52.5348|13.4176">Prenzlauer Berg</option>
          <option value="Kreuzberg|Oranienstr. 25, 10999 Berlin|52.4994|13.4217">Kreuzberg</option>
          <option value="RAW Gelände|Revaler Str. 99, 10245 Berlin|52.5079|13.4556">RAW Gelände</option>
          <option value="Tempelhofer Feld|Tempelhofer Damm 1-7, 12101 Berlin|52.4742|13.4010">Tempelhofer Feld</option>
          <option value="custom||52.5200|13.4050">Custom address…</option>
        </select>
        <div id="custom-address-wrap" class="hidden">
          <input id="custom-address" type="text" placeholder="Enter address…" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Description</label>
        <textarea id="description" rows="4" placeholder="Tell people what to expect, what to bring, who it's for…"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Max attendees</label>
          <input id="max-attendees" type="number" value="10" min="2" max="200" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Price (€, 0 = free)</label>
          <input id="price" type="number" value="0" min="0" step="0.5" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#9ca3af">Cover image URL (optional)</label>
        <input id="image-url" type="url" placeholder="https://images.unsplash.com/…" />
        <p class="text-xs mt-1" style="color:var(--muted)">Paste any public image URL, e.g. from Unsplash.</p>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 text-white font-semibold py-2.5 rounded-xl transition-colors"
          style="background:#4f46e5" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">
          Post event
        </button>
        <a href="index.html" class="px-5 py-2.5 rounded-xl text-sm font-medium transition-colors"
          style="border:1px solid var(--border);color:#9ca3af"
          onmouseover="this.style.background='#1e1e1e'" onmouseout="this.style.background=''">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="data.js"></script>
<script>
  document.getElementById("date").min = new Date().toISOString().split("T")[0];

  if (!STATE.currentUserId) {
    document.getElementById("form-wrap").classList.add("hidden");
    document.getElementById("auth-check").classList.remove("hidden");
  }

  document.getElementById("location-preset").addEventListener("change", function() {
    document.getElementById("custom-address-wrap").classList.toggle("hidden", !this.value.startsWith("custom|"));
  });

  document.getElementById("event-form").addEventListener("submit", e => {
    e.preventDefault();
    const uid = STATE.currentUserId;
    if (!uid) return;

    const preset   = document.getElementById("location-preset").value.split("|");
    const isCustom = preset[0] === "custom";
    const location = isCustom
      ? { name:"Custom", address: document.getElementById("custom-address").value.trim(), lat:52.5200, lng:13.4050 }
      : { name:preset[0], address:preset[1], lat:parseFloat(preset[2]), lng:parseFloat(preset[3]) };

    const newEvent = {
      id: "evt-" + Date.now(),
      title:        document.getElementById("title").value.trim(),
      description:  document.getElementById("description").value.trim(),
      category:     document.getElementById("category").value,
      date:         document.getElementById("date").value,
      time:         document.getElementById("time").value,
      location,
      maxAttendees: parseInt(document.getElementById("max-attendees").value),
      attendees:    [],
      hostId:       uid,
      imageUrl:     document.getElementById("image-url").value.trim() || undefined,
      price:        parseFloat(document.getElementById("price").value) || 0,
      createdAt:    new Date().toISOString(),
    };

    STATE.events.unshift(newEvent);
    const user = STATE.users.find(u => u.id === uid);
    if (user) user.eventsCreated++;
    saveState();
    window.location.href = `index.html?event=${newEvent.id}`;
  });
</script>
</body>
</html>
